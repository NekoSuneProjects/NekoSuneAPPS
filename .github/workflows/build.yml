name: Build NekoSuneAPPS

on:
  push:
    tags:
      - 'v*'

# softprops/action-gh-release needs write access to create the release + upload assets.
permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: windows
          - os: ubuntu-latest
            artifact: linux
          - os: macos-latest
            artifact: macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Linux needs extra libs for some native deps / AppImage packaging
      - name: Install Linux build deps
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y rpm fakeroot dpkg libudev-dev

      - name: Install dependencies
        run: npm install

      - name: Build app
        run: npx electron-builder --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No Apple certs on CI — don't attempt to sign/notarize (would fail the mac job).
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NekoSuneAPPS-${{ matrix.artifact }}
          retention-days: 14
          path: |
            dist/*.exe
            dist/*.msi
            dist/*.AppImage
            dist/*.deb
            dist/*.dmg
            dist/*.zip
          if-no-files-found: ignore

  release:
    name: Publish release
    needs: build
    # Publish on ANY tag (v1.0.7 or 1.0.7). !cancelled() lets the release run and
    # attach whatever built even if one OS leg failed (e.g. mac signing).
    if: ${{ !cancelled() && startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Build release notes from CHANGELOG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Extracting CHANGELOG notes for $VERSION"
          # Pull the section for this version (everything between its ## [x.y.z] header
          # and the next ## [ header) — gives the What's Added / Changed / Fixed lists.
          awk -v ver="$VERSION" '
            $0 ~ ("^## \\[" ver "\\]") { grab=1; next }
            grab && /^## \[/ { exit }
            grab { print }
          ' CHANGELOG.md > NOTES.md
          if [ ! -s NOTES.md ]; then printf "Release %s of NekoSuneAPPS.\n" "$VERSION" > NOTES.md; fi
          {
            printf "\n---\n## 📦 Downloads\n"
            printf -- "- **Windows:** \`NekoSuneAPPS-Setup-%s.exe\` (installer) or \`.msi\`\n" "$VERSION"
            printf -- "- **macOS:** \`.dmg\` / \`.zip\`   ·   **Linux:** \`.AppImage\` / \`.deb\`\n"
            printf -- "\n> Installers are unsigned, so Windows SmartScreen may warn on first run — click *More info → Run anyway*.\n"
          } >> NOTES.md
          echo "----- release notes -----"; cat NOTES.md
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          body_path: NOTES.md
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
