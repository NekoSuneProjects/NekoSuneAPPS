name: Build NekoSuneAPPS

on:
  push:
    tags:
      - 'v*'

# softprops/action-gh-release needs write access to create the release + upload assets.
permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: windows
          - os: ubuntu-latest
            artifact: linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Linux needs extra libs for some native deps / AppImage packaging
      - name: Install Linux build deps
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y rpm fakeroot dpkg libudev-dev

      - name: Install dependencies
        run: npm install

      # Builds the standalone update helper (updater/) for this OS and
      # normalizes its output to a fixed, predictable path/name so the main
      # app's extraFiles/extraResources config (package.json) doesn't need
      # to know electron-builder's exact per-arch output folder naming.
      - name: Build updater helper
        working-directory: updater
        run: npm install

      - name: Build updater helper (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: updater
        run: |
          npx electron-builder --win --publish never
          Copy-Item "dist\updater.exe" "updater.exe" -Force
        shell: pwsh

      - name: Build updater helper (Linux)
        if: matrix.os == 'ubuntu-latest'
        working-directory: updater
        run: |
          npx electron-builder --linux dir --publish never
          BIN_DIR=$(find dist -maxdepth 1 -iname '*-unpacked' | head -1)
          rm -rf linux-unpacked
          cp -R "$BIN_DIR" linux-unpacked

      - name: Build app
        run: npx electron-builder --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NekoSuneAPPS-${{ matrix.artifact }}
          retention-days: 14
          path: |
            dist/*.exe
            dist/*.msi
            dist/*.AppImage
            dist/*.deb
          if-no-files-found: ignore

  release:
    name: Publish release
    needs: build
    # Publish on ANY tag (v1.0.7 or 1.0.7). !cancelled() lets the release run and
    # attach whatever built even if one OS leg failed.
    if: ${{ !cancelled() && startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # Scans the Windows installers with VirusTotal and links the reports in
      # the release notes, so "installers are unsigned" doesn't have to be
      # taken on faith. Skips cleanly (no report section at all) if the
      # VT_API_KEY repo secret isn't set - a free key from
      # https://www.virustotal.com/gui/my-apikey, added under
      # Settings -> Secrets and variables -> Actions.
      - name: Scan installers with VirusTotal
        id: vtscan
        run: |
          : > vt-notes.md
          if [ -z "${VT_API_KEY:-}" ]; then
            echo "No VT_API_KEY secret set - skipping VirusTotal scan."
            exit 0
          fi
          echo "## 🛡️ VirusTotal" >> vt-notes.md
          shopt -s nullglob
          files=(artifacts/NekoSuneAPPS-windows/*.exe artifacts/NekoSuneAPPS-windows/*.msi)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No Windows installers found to scan." >> vt-notes.md
            exit 0
          fi
          for f in "${files[@]}"; do
            name=$(basename "$f")
            echo "Scanning $name..."
            size=$(stat -c%s "$f")
            if [ "$size" -gt 33554432 ]; then
              upload_url=$(curl -sS -H "x-apikey: $VT_API_KEY" https://www.virustotal.com/api/v3/files/upload_url | jq -r '.data')
            else
              upload_url="https://www.virustotal.com/api/v3/files"
            fi
            resp=$(curl -sS -X POST "$upload_url" -H "x-apikey: $VT_API_KEY" -F "file=@$f")
            analysis_id=$(echo "$resp" | jq -r '.data.id // empty')
            if [ -z "$analysis_id" ]; then
              echo "- **$name**: could not submit to VirusTotal" >> vt-notes.md
              continue
            fi
            status="queued"
            for i in $(seq 1 20); do
              sleep 15
              status_resp=$(curl -sS -H "x-apikey: $VT_API_KEY" "https://www.virustotal.com/api/v3/analyses/$analysis_id")
              status=$(echo "$status_resp" | jq -r '.data.attributes.status // "unknown"')
              [ "$status" = "completed" ] && break
            done
            if [ "$status" != "completed" ]; then
              echo "- **$name**: scan still in progress — [check status](https://www.virustotal.com/gui/file-analysis/$analysis_id)" >> vt-notes.md
              continue
            fi
            malicious=$(echo "$status_resp" | jq -r '.data.attributes.stats.malicious // 0')
            suspicious=$(echo "$status_resp" | jq -r '.data.attributes.stats.suspicious // 0')
            harmless=$(echo "$status_resp" | jq -r '.data.attributes.stats.harmless // 0')
            undetected=$(echo "$status_resp" | jq -r '.data.attributes.stats.undetected // 0')
            total=$((malicious + suspicious + harmless + undetected))
            flagged=$((malicious + suspicious))
            echo "- **$name**: $flagged/$total engines flagged something — [full report](https://www.virustotal.com/gui/file-analysis/$analysis_id)" >> vt-notes.md
          done
        env:
          VT_API_KEY: ${{ secrets.VT_API_KEY }}
        continue-on-error: true

      - name: Build release notes from CHANGELOG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Extracting CHANGELOG notes for $VERSION"
          # Pull the section for this version (everything between its ## [x.y.z] header
          # and the next ## [ header) — gives the What's Added / Changed / Fixed lists.
          awk -v ver="$VERSION" '
            $0 ~ ("^## \\[" ver "\\]") { grab=1; next }
            grab && /^## \[/ { exit }
            grab { print }
          ' CHANGELOG.md > NOTES.md
          if [ ! -s NOTES.md ]; then printf "Release %s of NekoSuneAPPS.\n" "$VERSION" > NOTES.md; fi
          {
            printf "\n---\n## 📦 Downloads\n"
            printf -- "- **Windows:** \`NekoSuneAPPS-Setup-%s.exe\` (installer) or \`.msi\`\n" "$VERSION"
            printf -- "- **Linux:** \`.AppImage\` / \`.deb\`\n"
            printf -- "\n> Installers are unsigned, so Windows SmartScreen may warn on first run — click *More info → Run anyway*.\n"
            if [ -s vt-notes.md ]; then printf "\n"; cat vt-notes.md; fi
          } >> NOTES.md
          echo "----- release notes -----"; cat NOTES.md
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          body_path: NOTES.md
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Posts a Discord announcement for the new release, with the changelog notes
      # and direct download links for whatever installers actually got built. The
      # webhook URL lives in the DISCORD_WEBHOOK_URL repo secret (Settings -> Secrets
      # and variables -> Actions) so it's never hardcoded here - skips cleanly (no
      # post at all) if that secret isn't set.
      - name: Notify Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "${DISCORD_WEBHOOK_URL:-}" ]; then
            echo "No DISCORD_WEBHOOK_URL secret set - skipping Discord notification."
            exit 0
          fi

          VERSION="${GITHUB_REF_NAME#v}"
          RELEASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/tag/${GITHUB_REF_NAME}"
          ICON_URL="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/main/assets/logo.png"

          # Release notes body, trimmed to fit under Discord's 4096-char embed description limit
          DESC=$(cat NOTES.md)
          if [ "${#DESC}" -gt 3500 ]; then
            DESC="${DESC:0:3500}"$'\n\n…continued — see the full release notes at the link above.'
          fi

          # Build a Downloads field from whatever assets actually got attached to the
          # release (so a partial build - e.g. one OS leg failed - doesn't dead-link)
          DOWNLOADS=""
          while IFS=$'\t' read -r name url; do
            case "$name" in
              *.exe)      label="🪟 Windows Installer (.exe)" ;;
              *.msi)      label="🪟 Windows Installer (.msi)" ;;
              *.AppImage) label="🐧 Linux (.AppImage)" ;;
              *.deb)      label="🐧 Linux (.deb)" ;;
              *)          continue ;;
            esac
            DOWNLOADS="${DOWNLOADS}[${label}](${url})"$'\n'
          done < <(gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[] | [.name, .url] | @tsv')

          if [ -z "$DOWNLOADS" ]; then DOWNLOADS="_No build assets were attached to this release._"; fi

          PAYLOAD=$(jq -n \
            --arg username "NekoSuneAPPS Release" \
            --arg avatar "$ICON_URL" \
            --arg title "NekoSuneAPPS v${VERSION}" \
            --arg url "$RELEASE_URL" \
            --arg desc "$DESC" \
            --arg downloads "$DOWNLOADS" \
            --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{
              username: $username,
              avatar_url: $avatar,
              embeds: [{
                title: $title,
                url: $url,
                description: $desc,
                color: 9055202,
                fields: [{ name: "📦 Downloads", value: $downloads, inline: false }],
                footer: { text: "NekoSuneAPPS", icon_url: $avatar },
                timestamp: $ts
              }]
            }')

          curl -sS -H "Content-Type: application/json" -X POST -d "$PAYLOAD" "$DISCORD_WEBHOOK_URL"
