name: General Question
description: Ask a general question about NekoSuneAPPS.
title: "[Question]: "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Have a question about NekoSuneAPPS? Please include context so the community can help.
  - type: textarea
    id: question
    attributes:
      label: Question
      description: What would you like to know?
      placeholder: Ask your question here.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: What are you trying to do, and what have you already checked?
      placeholder: Include links, docs, settings, or related details.
  - type: textarea
    id: attempted
    attributes:
      label: What have you tried?
      description: Share any troubleshooting steps, searches, or experiments you already did.
      placeholder: List anything you tried, if applicable.
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add screenshots, logs, or extra details here.
