name: Bug Report
description: Report a reproducible problem with NekoSuneAPPS.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide clear steps and environment details so we can reproduce it.
  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: What happened, and what did you expect to happen?
      placeholder: Describe the issue clearly.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps needed to trigger the bug.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
      placeholder: Describe the expected result.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
      placeholder: Include error messages or logs if available.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App version
      description: Which NekoSuneAPPS version or commit are you using?
      placeholder: e.g. v1.0.7 or commit hash
  - type: dropdown
    id: operating-system
    attributes:
      label: Operating system
      description: Where did the bug happen?
      options:
        - Windows
        - macOS
        - Linux
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs, screenshots, or recordings
      description: Paste relevant logs or attach screenshots/recordings.
      render: shell
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add anything else that may help us debug.
