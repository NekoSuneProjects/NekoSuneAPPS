name: Feature Request
description: Suggest a new feature or improvement for NekoSuneAPPS.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea to improve NekoSuneAPPS. Please include enough detail so we can understand the use case.
  - type: textarea
    id: summary
    attributes:
      label: Feature summary
      description: What would you like to see added or changed?
      placeholder: Briefly describe the feature request.
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What problem does this solve, or what workflow does it improve?
      placeholder: Explain why this feature would be useful.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe how you think the feature should work.
      placeholder: Include UI ideas, settings, examples, or expected behavior.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you tried any workarounds or considered other approaches?
      placeholder: List alternatives, if any.
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add screenshots, links, mockups, or any extra details here.
